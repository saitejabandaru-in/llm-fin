name: Publish NuGet Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore -c Release
      
    - name: Test / Verify
      run: dotnet run --project LlmProof.Core.csproj -c Release
      
    - name: Package NuGet
      run: dotnet pack -c Release -o out
      
    - name: Publish to GitHub Packages
      run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/saitejabandaru-in/index.json" --skip-duplicate
